<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry — Recipe & Drink Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            color: #2b2724; background: #fbf7f0;
            max-width: 900px; margin: 0 auto; padding: 48px 20px; line-height: 1.5;
        }
        h1 { font-family: "Fraunces", serif; font-size: 42px; text-align: center; margin: 0 0 8px; }
        .subtitle { text-align: center; color: #8a7f73; margin: 0 0 32px; font-size: 17px; }
        .search { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        input {
            font-size: 16px; padding: 12px 16px; width: 320px; max-width: 100%;
            border: 1px solid #e0d8cc; border-radius: 10px; background: #fff;
        }
        input:focus { outline: 2px solid #c1572f; border-color: #c1572f; }
        button {
            font-size: 16px; font-weight: 600; padding: 12px 22px; cursor: pointer;
            border: none; border-radius: 10px; background: #c1572f; color: #fff; transition: background 0.15s;
        }
        button:hover { background: #a8481f; }
        #recipes {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; margin-top: 32px;
        }
        .recipe {
            background: #fff; border-radius: 14px; overflow: hidden; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.15s, box-shadow 0.15s;
        }
        .recipe:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        .recipe img { width: 100%; height: 150px; object-fit: cover; display: block; }
        .recipe-body { padding: 14px; }
        .recipe-title { font-weight: 600; margin: 0; font-size: 15px; }
        .recipe-meta { margin: 6px 0 0; font-size: 13px; color: #8a7f73; }
        .message { text-align: center; color: #8a7f73; margin-top: 24px; }
        .divider { margin: 56px 0 40px; border: none; border-top: 1px solid #e7ddd0; }
        h2.section { font-family: "Fraunces", serif; font-size: 28px; text-align: center; margin: 0 0 16px; }
        #drink-row { text-align: center; }
        .drink-card {
            display: inline-flex; align-items: center; gap: 16px; background: #fff;
            padding: 16px 22px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-top: 18px;
        }
        .drink-emoji { font-size: 46px; line-height: 1; }
        .drink-card p { margin: 0; font-size: 17px; text-align: left; }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(40,30,20,0.55);
            justify-content: center; align-items: flex-start; padding: 40px 16px; overflow-y: auto; z-index: 10;
        }
        #modal-box {
            background: #fff; max-width: 620px; width: 100%; border-radius: 18px;
            padding: 32px 36px 40px; position: relative; text-align: left;
        }
        #close-btn {
            position: absolute; top: 16px; right: 16px; background: #f0e8dc; color: #2b2724;
            border-radius: 50%; width: 36px; height: 36px; font-size: 20px; padding: 0; line-height: 1;
        }
        #close-btn:hover { background: #e3d6c4; }
        #modal-box h2 { font-family: "Fraunces", serif; font-size: 28px; margin: 0 36px 6px 0; }
        .modal-img { width: 100%; height: 260px; object-fit: cover; border-radius: 12px; margin: 12px 0; }
        .meta { color: #8a7f73; margin: 0 0 20px; font-size: 15px; }
        #modal-box h3 { font-family: "Fraunces", serif; font-size: 20px; margin: 24px 0 8px; }
        #modal-box ul, #modal-box ol { padding-left: 22px; margin: 0; }
        #modal-box li { margin-bottom: 8px; }

        #save-btn { margin: 4px 0 12px; }
        #saved {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; margin-top: 24px;
        }
        .remove-btn {
            margin-top: 8px; background: #f0e8dc; color: #2b2724;
            font-size: 13px; font-weight: 500; padding: 6px 12px;
        }
        .remove-btn:hover { background: #e3d6c4; }
    </style>
</head>
<body>
    <h1>Pantry</h1>
    <p class="subtitle">Tell me what you've got — I'll find something to cook.</p>

    <div class="search">
        <input id="ingredients" placeholder="eggs, tomato, cheese">
        <button onclick="findRecipes()">Find recipes</button>
    </div>

    <div id="recipes"></div>

    <hr class="divider">

    <h2 class="section">What should I drink today?</h2>
    <div id="drink-row">
        <button onclick="getDrink()">Check the weather</button>
        <div id="result"></div>
    </div>

    <hr class="divider">

    <h2 class="section">Saved recipes</h2>
    <div id="saved"></div>

    <div id="modal" onclick="closeModal()">
        <div id="modal-box" onclick="event.stopPropagation()">
            <button id="close-btn" onclick="closeModal()">×</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        async function findRecipes() {
            const input = document.getElementById("ingredients").value;
            const recipesDiv = document.getElementById("recipes");

            if (input.trim() === "") {
                recipesDiv.innerHTML = "<p class='message'>Please type at least one ingredient.</p>";
                return;
            }

            recipesDiv.innerHTML = "<p class='message'>Searching...</p>";

            try {
                const response = await fetch("/api/recipes?ingredients=" + encodeURIComponent(input));
                const data = await response.json();

                if (data.error) {
                    recipesDiv.innerHTML = "<p class='message'>Problem: " + data.error + "</p>";
                    return;
                }
                if (data.recipes.length === 0) {
                    recipesDiv.innerHTML = "<p class='message'>No recipes found. Try different ingredients.</p>";
                    return;
                }

                recipesDiv.innerHTML = "";
                for (const recipe of data.recipes) {
                    recipesDiv.innerHTML +=
                        "<div class='recipe' onclick='showRecipe(" + recipe.id + ")'>" +
                        "<img src='" + recipe.image + "'>" +
                        "<div class='recipe-body'>" +
                        "<p class='recipe-title'>" + recipe.title + "</p>" +
                        "<p class='recipe-meta'>Uses " + recipe.used + " of yours · " + recipe.missed + " more needed</p>" +
                        "</div>" +
                        "</div>";
                }
            } catch (err) {
                recipesDiv.innerHTML = "<p class='message'>Couldn't reach the server — check the terminal.</p>";
            }
        }

       async function showRecipe(id) {
            const modal = document.getElementById("modal");
            const content = document.getElementById("modal-content");
            content.innerHTML = "<p class='message'>Loading recipe...</p>";
            modal.style.display = "flex";

            const response = await fetch("/api/recipe/" + id);
            const data = await response.json();

            currentRecipe = { id: id, title: data.title, image: data.image };
            /* this line is for localStorage version — now replaced with server-side storage, but keeping this here in case you want to switch back or see how it was done without a backend.
            const alreadySaved = getSaved().some(function (r) { return r.id === id; });*/
            const saved = await getSaved();
            const alreadySaved = saved.some(function (r) { return r.id === id; });

            let html = "<h2>" + data.title + "</h2>";
            html += "<img src='" + data.image + "' class='modal-img'>";
            html += "<p class='meta'>Ready in " + data.readyInMinutes + " min · Serves " + data.servings + "</p>";
            html += "<button id='save-btn' onclick='saveCurrentRecipe()'>" +
                    (alreadySaved ? "✓ Saved" : "♥ Save recipe") + "</button>";

            html += "<h3>Ingredients</h3><ul>";
            for (const ing of data.ingredients) {
                html += "<li>" + ing + "</li>";
            }
            html += "</ul>";

            html += "<h3>Instructions</h3>";
            if (data.steps.length === 0) {
                html += "<p>No step-by-step instructions available for this one.</p>";
            } else {
                html += "<ol>";
                for (const step of data.steps) {
                    html += "<li>" + step + "</li>";
                }
                html += "</ol>";
            }

            content.innerHTML = html;
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

       function getDrink() {
            const result = document.getElementById("result");
            result.innerHTML = "<p class='message'>Finding your location...</p>";

            if (!navigator.geolocation) {
                fetchWeather();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function (position) {
                    fetchWeather(position.coords.latitude, position.coords.longitude);
                },
                function () {
                    fetchWeather();
                },
                { timeout: 8000 }
            );
        }

        async function fetchWeather(lat, lon) {
            const result = document.getElementById("result");
            result.innerHTML = "<p class='message'>Checking the weather...</p>";

            let url = "/api/weather";
            if (lat !== undefined && lon !== undefined) {
                url += "?lat=" + lat + "&lon=" + lon;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();

                result.innerHTML =
                    "<div class='drink-card'>" +
                    "<div class='drink-emoji'>" + data.emoji + "</div>" +
                    "<p>It's " + data.temperature + "°C — you should have " + data.drink + ".</p>" +
                    "</div>";
            } catch (err) {
                result.innerHTML = "<p class='message'>Couldn't get the weather right now.</p>";
            }
        }

        /*this block is for localStorage version — now replaced with server-side storage, but keeping this here in case you want to switch back or see how it was done without a backend.
        let currentRecipe = null;

        function getSaved() {
            const raw = localStorage.getItem("savedRecipes");
            return raw ? JSON.parse(raw) : [];
        }

        function setSaved(list) {
            localStorage.setItem("savedRecipes", JSON.stringify(list));
        }

        function saveCurrentRecipe() {
            if (!currentRecipe) return;
            const saved = getSaved();
            if (!saved.some(function (r) { return r.id === currentRecipe.id; })) {
                saved.push(currentRecipe);
                setSaved(saved);
                renderSaved();
            }
            document.getElementById("save-btn").textContent = "✓ Saved";
        }

        function removeRecipe(event, id) {
            event.stopPropagation();
            const saved = getSaved().filter(function (r) { return r.id !== id; });
            setSaved(saved);
            renderSaved();
        }

        function renderSaved() {
            const savedDiv = document.getElementById("saved");
            const saved = getSaved();

            if (saved.length === 0) {
                savedDiv.innerHTML = "<p class='message'>No saved recipes yet — open a recipe and tap Save.</p>";
                return;
            }

            savedDiv.innerHTML = "";
            for (const recipe of saved) {
                savedDiv.innerHTML +=
                    "<div class='recipe' onclick='showRecipe(" + recipe.id + ")'>" +
                    "<img src='" + recipe.image + "'>" +
                    "<div class='recipe-body'>" +
                    "<p class='recipe-title'>" + recipe.title + "</p>" +
                    "<button class='remove-btn' onclick='removeRecipe(event, " + recipe.id + ")'>Remove</button>" +
                    "</div>" +
                    "</div>";
            }
        }

        renderSaved();*/ 

        let currentRecipe = null;

        async function getSaved() {
            const response = await fetch("/api/saved");
            const data = await response.json();
            return data.recipes;
        }

        async function saveCurrentRecipe() {
            if (!currentRecipe) return;
            await fetch("/api/saved", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(currentRecipe)
            });
            renderSaved();
            document.getElementById("save-btn").textContent = "✓ Saved";
        }

        async function removeRecipe(event, id) {
            event.stopPropagation();
            await fetch("/api/saved/" + id, { method: "DELETE" });
            renderSaved();
        }

        async function renderSaved() {
            const savedDiv = document.getElementById("saved");
            const saved = await getSaved();

            if (saved.length === 0) {
                savedDiv.innerHTML = "<p class='message'>No saved recipes yet — open a recipe and tap Save.</p>";
                return;
            }

            savedDiv.innerHTML = "";
            for (const recipe of saved) {
                savedDiv.innerHTML +=
                    "<div class='recipe' onclick='showRecipe(" + recipe.id + ")'>" +
                    "<img src='" + recipe.image + "'>" +
                    "<div class='recipe-body'>" +
                    "<p class='recipe-title'>" + recipe.title + "</p>" +
                    "<button class='remove-btn' onclick='removeRecipe(event, " + recipe.id + ")'>Remove</button>" +
                    "</div>" +
                    "</div>";
            }
        }
    </script>
</body>
</html>
