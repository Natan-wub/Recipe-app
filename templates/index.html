<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry — Recipe & Drink Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Pantry</h1>
    <p class="subtitle">Tell me what you've got — I'll find something to cook.</p>

    <div class="search">
        <input id="ingredients" placeholder="eggs, tomato, cheese">
        <button onclick="findRecipes()">Find recipes</button>
    </div>

    <div id="recipes"></div>

    <hr class="divider">

    <h2 class="section">What should I drink today?</h2>
    <div id="drink-row">
        <button onclick="getDrink()">Check the weather</button>
        <div id="result"></div>
    </div>

    <hr class="divider">

    <h2 class="section">Saved recipes</h2>
    <div id="saved"></div>

    <div id="modal" onclick="closeModal()">
        <div id="modal-box" onclick="event.stopPropagation()">
            <button id="close-btn" onclick="closeModal()">×</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
